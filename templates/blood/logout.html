{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out - Blood Bank</title>
    
    <!-- Bootstrap & Google Fonts -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">

    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }

        .logout-section {
            min-height: 80vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .logout-card {
            background: white;
            padding: 50px 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
            transition: transform 0.3s ease;
        }

        .logout-card:hover {
            transform: translateY(-5px);
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background: rgba(220, 53, 69, 0.1);
            color: #dc3545;
            font-size: 50px;
            line-height: 100px;
            border-radius: 50%;
            margin: 0 auto 25px auto;
        }

        .logout-card h1 {
            font-size: 28px;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 15px;
        }

        .logout-card p {
            color: #636e72;
            font-size: 15px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .logout-btn {
          padding: 12px 35px;
         border-radius: 50px;
         font-weight: 600;
         text-transform: uppercase;
         letter-spacing: 1px;
         transition: all 0.3s ease; 
    
    
    background: linear-gradient(90deg, #c31432, #240b36);
    
   
    color: white !important; 
    border: none; 
    display: inline-block;
    }
        

        .logout-btn:hover {
       
       background: linear-gradient(90deg, #c31432, #240b36);
       color: white !important;
    
  
    box-shadow: 0 8px 20px rgba(195, 20, 50, 0.4); 
    transform: translateY(-3px) scale(1.02);
    text-decoration: none; 
}
    </style>
</head>
<body>

    {% include "blood/navbar.html" %}

    <section class="logout-section">
        <div class="logout-card shadow-lg">

            <div class="icon-circle">
                <i class="fas fa-sign-out-alt"></i>
            </div>

           
            <h1>Logged Out!</h1>
            <p>You have been successfully logged out. <br> Thank you for your contribution to saving lives!</p>

            <a href="/" class="btn logout-btn">
                <i class="fas fa-home mr-2"></i> Back to Home
            </a>
        </div>
    </section>

    {% include "blood/footer.html" %}

    <!-- Scripts -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
